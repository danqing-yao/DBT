version: 2

sources:
    - name: jaffle_shop
      description: This is a replica of the Postgres database used by our app
      database: chipmunk_raw
      schema: jaffle_shop

      tables:
          - name: customers
            columns:
              - name: id
                tests:
                  - unique
                  - not_null
                
          - name: orders
            loaded_at_field: _etl_loaded_at
            freshness: 
              warn_after: {count: 7, period: day}
              error_after: {count: 7, period: day}
            columns:
              - name: id
                tests:
                  - unique
                  - not_null


            